name: macOS ARM64 Release Build

# Triggers:
#   - push of a version tag (v*) → full release build + auto-upload to GitHub Release
#   - manual workflow_dispatch → for testing without tagging
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      label:
        description: 'Version label for the artifact (e.g. "test-2026-04-24")'
        required: false
        default: ''

permissions:
  contents: write  # needed for release asset upload

jobs:
  macos-arm64:
    name: Build macOS ARM64 binary
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for `git describe` during the build

      - name: Install Homebrew dependencies
        run: |
          set -euxo pipefail
          brew update
          brew install \
            automake libtool boost gmp pkg-config libevent \
            miniupnpc libnatpmp zeromq qrencode \
            berkeley-db@5 sqlite3 python@3 \
            qt@5
          brew --version
          clang --version

      - name: Autogen
        run: |
          set -euxo pipefail
          ./autogen.sh

      - name: Configure (full log, stops on error)
        run: |
          set -euxo pipefail
          BREW_PREFIX=$(brew --prefix)
          BDB_PREFIX=$(brew --prefix berkeley-db@5)
          QT5_PREFIX=$(brew --prefix qt@5)
          echo "Using BREW_PREFIX=$BREW_PREFIX"
          echo "Using BDB_PREFIX=$BDB_PREFIX"
          echo "Using QT5_PREFIX=$QT5_PREFIX"
          # qt@5 is keg-only on Homebrew — must be exposed via PATH +
          # PKG_CONFIG_PATH so configure's Qt detection picks it up.
          export PATH="${QT5_PREFIX}/bin:${PATH}"
          export PKG_CONFIG_PATH="${QT5_PREFIX}/lib/pkgconfig:${BREW_PREFIX}/lib/pkgconfig"
          # --with-incompatible-bdb lets us use modern BDB (>=5) instead of 4.8.
          # Wallets created/read by this build use newer BDB format; acceptable
          # for alpha but noted in release notes.
          ./configure \
            --disable-tests \
            --disable-bench \
            --disable-gui-tests \
            --with-gui=qt5 \
            --with-incompatible-bdb \
            --disable-stacktraces \
            BDB_LIBS="-L${BDB_PREFIX}/lib -ldb_cxx-5" \
            BDB_CFLAGS="-I${BDB_PREFIX}/include" \
            CPPFLAGS="-I${BREW_PREFIX}/include -I${QT5_PREFIX}/include" \
            LDFLAGS="-L${BREW_PREFIX}/lib -L${QT5_PREFIX}/lib"

      - name: Build
        run: |
          set -euxo pipefail
          make -j$(sysctl -n hw.logicalcpu)

      - name: Verify build artifacts exist
        run: |
          set -euxo pipefail
          ls -l src/ratatoskrd src/ratatoskr-cli src/ratatoskr-tx src/qt/ratatoskr-qt
          file src/ratatoskrd
          file src/qt/ratatoskr-qt

      - name: Smoke-test binary
        run: |
          set -euxo pipefail
          ./src/ratatoskrd --version
          ./src/ratatoskr-cli --version

      - name: Determine version label
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            # Strip leading 'v' so tag v1.0.0-alpha yields tarball ratatoskr-1.0.0-alpha-*.
            # Matches the convention used by Bitcoin, Dash, and our manual Linux/Windows builds.
            VERSION="${VERSION#v}"
          elif [[ -n "${{ inputs.label }}" ]]; then
            VERSION="${{ inputs.label }}"
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version label: ${VERSION}"

      - name: Stage + package tarball
        id: package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          STAGE="ratatoskr-${VERSION}-macos-arm64"
          mkdir -p "${STAGE}/bin" "${STAGE}/doc"

          # CLI/daemon binaries
          for b in ratatoskrd ratatoskr-cli ratatoskr-tx; do
            if [ -f "src/$b" ]; then
              cp "src/$b" "${STAGE}/bin/"
              strip "${STAGE}/bin/$b" 2>/dev/null || true
            else
              echo "!! missing expected binary: src/$b"
              exit 1
            fi
          done

          # Qt GUI wallet (lives in src/qt/)
          if [ -f "src/qt/ratatoskr-qt" ]; then
            cp "src/qt/ratatoskr-qt" "${STAGE}/bin/"
            strip "${STAGE}/bin/ratatoskr-qt" 2>/dev/null || true
          else
            echo "!! missing expected binary: src/qt/ratatoskr-qt"
            exit 1
          fi

          # docs (best-effort — any missing ones just skipped)
          for d in whitepaper mining quickstart pool-operator-spec masternode-setup \
                   launch-announcement launch-day-runbook treasury-keygen-runbook \
                   release-notes-v1.0.0-alpha testnet-plan launch-schedule launch-outreach \
                   discord-teaser; do
            [ -f "doc/$d.md" ] && cp "doc/$d.md" "${STAGE}/doc/"
          done
          [ -f README.md ] && cp README.md "${STAGE}/"

          # package
          tar czf "${STAGE}.tar.gz" "${STAGE}/"
          shasum -a 256 "${STAGE}.tar.gz" | tee "${STAGE}.tar.gz.sha256"

          ls -lh "${STAGE}.tar.gz"
          echo "tarball=${STAGE}.tar.gz" >> $GITHUB_OUTPUT
          echo "sha=${STAGE}.tar.gz.sha256" >> $GITHUB_OUTPUT

      - name: Upload build artifacts (always, 7-day retention)
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-${{ steps.version.outputs.version }}
          path: |
            ratatoskr-*-macos-arm64.tar.gz
            ratatoskr-*-macos-arm64.tar.gz.sha256
          retention-days: 7
          if-no-files-found: error

      - name: Attach to GitHub Release (only on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ratatoskr-*-macos-arm64.tar.gz
            ratatoskr-*-macos-arm64.tar.gz.sha256
          fail_on_unmatched_files: true
          token: ${{ secrets.GITHUB_TOKEN }}

      # Notes for future iterations:
      # - Qt GUI wallet is now enabled via brew qt@5 + --with-gui=qt5. Output
      #   binary is src/qt/ratatoskr-qt and ships in the tarball alongside the
      #   CLI binaries. .app bundle / .dmg packaging is a separate future step
      #   (requires `make deploy` plus codesigning).
      # - Wallet support IS enabled via --with-incompatible-bdb with BDB 5.
      #   Wallets created by this build use BDB 5 format; not backward-compatible
      #   with BDB 4.8 wallets from official Dash binaries. Noted in release notes.
      # - Code signing is not performed. Users may see Gatekeeper warnings on
      #   first run; they can allow via System Settings → Privacy & Security.
      #   Proper signing requires Apple Developer Program ($99/yr) for
      #   notarization. Evaluate when the project has its own Apple ID.
      # - Linux + Windows CI jobs can be added as additional jobs in this file
      #   or a sibling workflow. Current Linux/Windows builds run manually on
      #   VPS1 with the same binaries this CI would produce.
